spring.application.name=scalelab

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/scalelab
spring.datasource.username=postgres
spring.datasource.password=Passw@rd
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# Pagination defaults
app.pagination.default-page=0
app.pagination.default-size=20
app.pagination.max-size=100

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Cache TTL = 60 seconds (short for trading data)
app.cache.ttl-seconds=60

# HikariCP Connection Pool ? intentionally tight for experiments
# max pool size = 10 (default, keeping it small to expose exhaustion)
spring.datasource.hikari.maximum-pool-size=10
# connection timeout = 5 seconds (default is 30s ? lowered to trigger exhaustion errors faster)
spring.datasource.hikari.connection-timeout=5000
# leak detection = 2 seconds (logs warning if connection held longer than this)
spring.datasource.hikari.leak-detection-threshold=2000
# pool name for easy identification in logs
spring.datasource.hikari.pool-name=ScaleLabPool

# Logging
logging.level.io.scalelab=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=DEBUG

